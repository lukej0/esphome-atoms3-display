# Font definitions for AtomS3 Display
# Header font
- file: "gfonts://Roboto"
  id: my_header_font
  size: 20
  
# Main text font
- file: "gfonts://Roboto"
  id: my_font
  size: 30

# Material Design Icons font with specific glyphs
# Note: Glyphs list MUST match all icons defined in home_icons.yaml
- file: gfonts://Material+Symbols+Rounded
  id: icon_font
  size: 50
  glyphs:
    # Standard
    - "\U0000e295"  # home_app_logo
    # Climate
    - "\U0000f076"  # thermostat
    - "\U0000f6dd"  # readiness_score
    - "\U0000e798"  # water_drop
    - "\U0000f16a"  # mode_heat
    - "\U0000f166"  # mode_cool
    # Connectivity
    - "\U0000e63e"  # wifi
    - "\U0000e1a7"  # bluetooth
    - "\U0000e0cd"  # phone
    - "\U0000e80b"  # public
    - "\U0000e307"  # cast
    # Notifications
    - "\U0000e7f4"  # notifications
    - "\U0000e002"  # warning
    - "\U0000e88e"  # info
    - "\U0000e000"  # error
    - "\U0000f5f4"  # deployed_code_update
    # Time
    - "\U0000e8b5"  # schedule
    - "\U0000e425"  # timer
    - "\U0000e855"  # alarm
