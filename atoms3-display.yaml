esphome:
  name: atoms3-serverschrank
  friendly_name: Atoms3 Serverschrank

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

logger:

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret s_wifi_ssid
      password: !secret s_wifi_password
  use_address: 192.168.2.60
  ap:
    ssid: "Atoms3-Fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

captive_portal:

# I2C Bus für den Grove Port A (G2=SDA, G1=SCL)
i2c:
  - id: bus_a
    sda: GPIO2
    scl: GPIO1
    scan: true

# SPI für das interne Display des Atom S3
spi:
  clk_pin: GPIO17
  mosi_pin: GPIO21

sensor:
  - platform: sht3xd
    i2c_id: bus_a
    temperature:
      name: "Schrank Temperatur"
      id: schrank_temp
    humidity:
      name: "Schrank Luftfeuchtigkeit"
      id: schrank_hum
    address: 0x44

  - platform: qmp6988
    i2c_id: bus_a
    pressure:
      name: "Schrank Luftdruck"
      id: schrank_press
    address: 0x70

substitutions:
  display_rotation: "0" # Set display rotation: 0, 90, 180, or 270
  font_family: "gfonts://Roboto"
  font_size_big: "30"
  font_size_small: "20"
  text_align: "TextAlign::CENTER"
  header_x_position: "it.get_width() / 2"
  header_y_position: "it.get_height() / 2 - 50"
  text_x_position: "it.get_width() / 2"
  text_y_position: "it.get_height() / 2 + 45"
  icon_x_position: "it.get_width() / 2"
  icon_y_position: "it.get_height() / 2 - 5"

globals:
  - id: bg_red
    type: float
    initial_value: '1.0'
  - id: bg_green
    type: float
    initial_value: '1.0'
  - id: bg_blue
    type: float
    initial_value: '1.0'

# Load fonts
font: !include fonts.yaml

# Mapping component: Maps friendly names to unicode glyphs
mapping:
  - id: icon_map
    from: string
    to: string
    entries: !include home_icons.yaml

# Define the display
display:
  - platform: mipi_spi
    id: atom_display
    model: GC9A01A
    dimensions:
      height: 128
      width: 128
      offset_height: 1
      offset_width: 2
      pad_height: 1
      pad_width: 1
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    cs_pin: GPIO15
    dc_pin: GPIO33
    reset_pin: GPIO34
    invert_colors: true
    buffer_size: 100%
    update_interval: 1s
    lambda: |-
      // Get friendly name from select and lookup unicode glyph from mapping
      std::string icon_str = id(icon_map)[id(display_icon).current_option().c_str()];
      const char* icon_char = icon_str.c_str();
      
      if (id(screen_colors).current_values.is_on()) {
        // Light is ON -> Use the color from globals
        auto bg_color = Color(id(bg_red) * 255, id(bg_green) * 255, id(bg_blue) * 255);
        // Set text/icon color based on background brightness for contrast
        auto fg_color = (id(bg_red) * 0.299 + id(bg_green) * 0.587 + id(bg_blue) * 0.114) > 0.5 ? Color(0, 0, 0) : Color(255, 255, 255);
        it.fill(bg_color);

        // Draw header
        it.print($header_x_position, $header_y_position, id(my_header_font), fg_color, TextAlign::CENTER, id(display_title).state.c_str());
        
        // Draw icon
        it.printf($icon_x_position, $icon_y_position, id(icon_font), fg_color, TextAlign::CENTER, "%s", icon_char);
        
        // Draw text
        it.printf($text_x_position, $text_y_position, id(my_font), fg_color, $text_align, "%s", id(display_text).state.c_str());
      } else {
        // Light is OFF -> Black background, white text/icon
        it.fill(Color(0, 0, 0));

        // Draw header
        it.print($header_x_position, $header_y_position, id(my_header_font), Color(255, 255, 255), TextAlign::CENTER, id(display_title).state.c_str());
        
        // Draw icon
        it.printf($icon_x_position, $icon_y_position, id(icon_font), Color(255, 255, 255), TextAlign::CENTER, "%s", icon_char);
        
        // Draw text
        it.printf($text_x_position, $text_y_position, id(my_font), Color(255, 255, 255), $text_align, "%s", id(display_text).state.c_str());
      }

# Built-in Button (on GPIO 41, which is the screen itself)
binary_sensor:
  - platform: gpio
    pin: 
      number: 41
      inverted: true
      mode:
        input: true
        pullup: true
    name: "AtomS3 Button"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: "Button Pressed!"
        - light.toggle: screen_colors
    on_release:
      then:
        - logger.log: "Button Released!"

# Virtual outputs to connect the RGB light to our globals
output:
  - platform: template
    id: red_output
    type: float
    write_action:
      - lambda: |-
          id(bg_red) = state;
  - platform: template
    id: green_output
    type: float
    write_action:
      - lambda: |-
          id(bg_green) = state;
  - platform: template
    id: blue_output
    type: float
    write_action:
      - lambda: |-
          id(bg_blue) = state;
          id(atom_display).update();

# Virtual RGB light that controls the outputs
light:
  - platform: rgb
    name: "Screen Colors"
    id: screen_colors
    red: red_output
    green: green_output
    blue: blue_output
text:
  - platform: template
    name: "Display Text"
    id: display_text
    initial_value: "Hola"
    optimistic: true
    mode: text
    on_value:
      then:
        - component.update: atom_display

  - platform: template
    name: "Display Title"
    id: display_title
    initial_value: "Info"
    optimistic: true
    mode: text
    on_value:
      then:
        - component.update: atom_display

select:
  - platform: template
    name: "Display Icon"
    id: display_icon
    optimistic: true
    initial_option: "Home"
    options:
    # Standard
    - "Home"
    # Climate
    - "Temperatur"
    - "Luftdruck"
    - "Luftfeuchtigkeit"
    - "Heiß"
    - "Kalt"
    # Connectivity
    - "WiFi"
    - "Bluetooth"
    - "Telefon"
    - "Public"
    - "Cast"
    # Notifications
    - "Benachrichtigung"
    - "Warnung"
    - "Info"
    - "Fehler"
    - "Update"
    # Time
    - "Uhr"
    - "Timer"
    - "Stoppuhr"
    on_value:
      then:
        - component.update: atom_display

switch:
  - platform: gpio
    pin: GPIO16
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    inverted: false
